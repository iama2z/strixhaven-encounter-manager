name: strixhaven_encounter_manager
description: "Tabletop RPG encounter tracker — real-time battle timeline frontend"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_fonts: ^6.2.1
  provider: ^6.1.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
